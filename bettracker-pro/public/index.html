<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BetTracker">
  <meta name="theme-color" content="#171614">
  <title>BetTracker Pro</title>
  <link rel="manifest" href="/manifest.json">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <a href="#main" class="sr-only">Aller au contenu</a>

  <header class="topbar">
    <div class="brand">
      <svg class="logo" viewBox="0 0 48 48" fill="none" aria-label="BetTracker logo">
        <rect width="48" height="48" rx="12" fill="var(--color-primary)"/>
        <path d="M12 34L22 24L29 30L36 16" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M30 16H36V22" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div>
        <span class="brand-name">BetTracker Pro</span>
        <span class="brand-bankroll" id="topBankroll">Chargement...</span>
      </div>
    </div>
    <div class="topbar-end">
      <button class="icon-btn" id="settingsBtn" aria-label="Paramètres">⚙️</button>
      <button class="icon-btn" id="themeBtn" aria-label="Thème">🌙</button>
    </div>
  </header>

  <nav class="bottomnav" role="navigation" aria-label="Navigation principale">
    <button class="nav-item active" data-view="dashboard"><span>Dashboard</span></button>
    <button class="nav-item" data-view="history"><span>Historique</span></button>
    <button class="nav-item nav-add" data-view="add"><span>＋</span></button>
    <button class="nav-item" data-view="open"><span>En cours</span></button>
    <button class="nav-item" data-view="stats"><span>Stats</span></button>
  </nav>

  <main class="main" id="main">
    <section class="view active" id="view-dashboard">
      <div class="bankroll-hero">
        <div class="bankroll-hero-inner">
          <span class="metric-label">Bankroll totale</span>
          <strong class="bankroll-amount tabular" id="heroBankroll">…</strong>
          <span class="bankroll-sub" id="heroPnl">—</span>
        </div>
        <div class="bankroll-meta">
          <div class="mini-metric"><span class="metric-label">Paris clôturés</span><strong class="tabular" id="metCount">—</strong></div>
          <div class="mini-metric"><span class="metric-label">En cours</span><strong class="tabular" id="metOpen">—</strong></div>
          <div class="mini-metric"><span class="metric-label">Taux réussite</span><strong class="tabular" id="metHitRate">—</strong></div>
          <div class="mini-metric"><span class="metric-label">Cote moy.</span><strong class="tabular" id="metAvgOdds">—</strong></div>
        </div>
      </div>

      <div class="filters-bar" id="dashFilters">
        <select class="filter-select" id="fSport"><option value="">Tous les sports</option></select>
        <select class="filter-select" id="fBookmaker"><option value="">Tous les bookmakers</option></select>
        <select class="filter-select" id="fPeriod">
          <option value="">Toute la période</option>
          <option value="7">7 derniers jours</option>
          <option value="30">30 derniers jours</option>
          <option value="month">Ce mois</option>
          <option value="year">Cette année</option>
          <option value="custom">Période libre</option>
        </select>
        <div id="customDateRange" class="custom-range" style="display:none">
          <input type="date" id="fDateStart" class="filter-select">
          <input type="date" id="fDateEnd" class="filter-select">
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>Courbe de bankroll</h2>
          <span class="chip">Historique</span>
        </div>
        <div class="chart-wrap">
          <canvas id="bankrollChart"></canvas>
